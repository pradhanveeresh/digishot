<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #flipbook { width: 800px; height: 500px; }
        .page { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* असली मैगजीन वाली बीच की परछाई (The Crease) */
        .page-wrapper { -webkit-perspective: 2000px; -moz-perspective: 2000px; }
        .shadow { 
            -webkit-box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            -moz-box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

<div id="flipbook">
    <div class="page"><img src="albums/1.jpg" width="100%" height="100%"></div>
    <div class="page"><img src="albums/2.jpg" width="100%" height="100%"></div>
    <div class="page"><img src="albums/3.jpg" width="100%" height="100%"></div>
    <div class="page"><img src="albums/4.jpg" width="100%" height="100%"></div>
</div>

<script>
    $("#flipbook").turn({
        width: 800,
        height: 500,
        autoCenter: true,
        display: 'double', // असली एलबम लुक
        acceleration: true,
        gradients: true, // पन्ना मुड़ते वक्त की चमक
        elevation: 50,
        when: {
            turning: function(e, page, view) {
                console.log("Page " + page + " पलट रहा है!");
            }
        }
    });
</script>

</body>
</html>
