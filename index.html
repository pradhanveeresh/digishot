<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiShot Wedding Flipbook</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <div class="app-shell">
    <header class="top-bar">
      <div class="brand-wrap">
        <h1 id="albumTitle">DigiShot Wedding Album</h1>
        <p class="subtitle">Elegant digital memories</p>
      </div>

      <div class="controls-top">
        <button id="prevBtn" class="btn gold-btn">⟵ Prev</button>
        <span id="pageInfo" class="page-info">Page 0 / 0</span>
        <button id="nextBtn" class="btn gold-btn">Next ⟶</button>
      </div>
    </header>

    <main class="viewer-area">
      <div id="loadingOverlay" class="loading-overlay">
        <div class="loader-card">
          <div class="spinner"></div>
          <h2>Loading your wedding album...</h2>
          <p>Please wait while pages are being prepared.</p>
        </div>
      </div>

      <div class="book-frame">
        <div id="flipbook"></div>
      </div>
    </main>

    <footer class="bottom-bar">
      <div class="music-panel">
        <button id="musicToggle" class="btn music-btn">🔇 Play Music</button>
        <span id="musicLabel">Music: Not started</span>
      </div>

      <div class="link-panel">
        <button id="copyLinkBtn" class="btn secondary-btn">Copy Link</button>
      </div>
    </footer>
  </div>

  <!-- Hidden audio -->
  <audio id="bgMusic" preload="auto" loop></audio>

  <!-- Libraries -->
  <script src="./libs/jquery.min.js"></script>
  <script src="./libs/turn.min.js"></script>
  <script src="./libs/pdf.min.js"></script>

  <!-- App Script -->
  <script src="./script.js"></script>
</body>
</html>
