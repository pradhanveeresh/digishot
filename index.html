<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DigiShot Premium Flipbook</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
  <div id="app-bg" class="page-bg"></div>
  
  <div id="particles-js" style="position:fixed; inset:0; z-index:1; pointer-events:none;"></div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="logo-circle">
      <span class="text-digi">DIGI</span>
      <span class="text-shot">SHOT</span>
    </div>
  </div>

  <div class="app-shell">
    <main class="viewer-area">
      <div class="book-frame">
        <div id="flipbook">
          </div>
      </div>
    </main>

    <div class="bottom-bar-fixed">
      <button id="prevBtn" class="control-btn" title="Previous Page">◀</button>
      <button id="nextBtn" class="control-btn" title="Next Page">▶</button>
      <button id="musicToggle" class="control-btn" title="Play/Pause Music">🎵</button>
      <button id="fullscreenBtn" class="control-btn" title="Full Screen">⛶</button>
    </div>
  </div>

  <audio id="bgMusic" loop></audio>

  <script src="./libs/jquery.min.js"></script>
  <script src="./libs/turn.min.js"></script>
  <script src="./libs/pdf.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
