<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DigiShot Premium Flipbook</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="logo-circle">
      <span class="text-digi">DIGI</span>
      <span class="text-shot">SHOT</span>
      <span class="text-tagline">Premium Digital Experience</span>
    </div>
  </div>

  <div class="app-shell">
    
    <main class="viewer-area">
      <div class="book-frame">
        <div id="flipbook">
          
          <div class="hard front-cover">
            <div class="cover-content">
              <h1 id="albumTitle">DigiShot</h1>
              <p class="subtitle">Exclusive Edition</p>
            </div>
          </div>

          <div class="hard back-cover">
            <div class="cover-content">
              <h3>Connect With Us</h3>
              <div class="social-links">
                <button class="social-btn whatsapp" disabled>WhatsApp</button>
                <button class="social-btn instagram" disabled>Instagram</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>

    <div class="controls-container">
      <button id="prevBtn" class="control-btn" title="Previous Page">◀</button>
      <button id="nextBtn" class="control-btn" title="Next Page">▶</button>
      <button id="musicToggle" class="control-btn" title="Play/Pause Music">🎵</button>
      <button id="fullscreenBtn" class="control-btn" title="Full Screen">⛶</button>
    </div>

  </div>

  <audio id="bgMusic" preload="auto" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <script src="./libs/jquery.min.js"></script>
  <script src="./libs/turn.min.js"></script>
  <script src="./libs/pdf.min.js"></script>

  <script src="./script.js"></script>
</body>
</html>
