<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DigiShot Premium 3D Flipbook</title>
    
    <link rel="stylesheet" href="./style.css">

    <script src="./libs/pdf.min.js"></script>
    <script src="./libs/pdf.worker.min.js"></script>

    <script src="./libs/page-flip.browser.min.js"></script>
    
    <script src="./libs/particles.min.js"></script>
</head>
<body>

    <div id="app-bg" class="app-background"></div>

    <div id="particles-js"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="logo-circle">
            <span class="text-digi">DIGI</span>
            <span class="text-shot">SHOT</span>
        </div>
    </div>

    <div class="app-shell">
        <main class="viewer-area">
            <div id="book-container" class="book-container">
                </div>
        </main>

        <div class="bottom-bar-left">
            <button id="prevBtn" class="control-btn" title="Previous">◀</button>
            <button id="nextBtn" class="control-btn" title="Next">▶</button>
            <button id="musicToggle" class="control-btn" title="Music">🎵</button>
            <button id="fullscreenBtn" class="control-btn" title="Full Screen">⛶</button>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>

    <script src="./script.js"></script>
</body>
</html>
